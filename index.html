<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Minimal Fitness App</title>
	<link rel="stylesheet" href="styles.css">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>

<body>
	<div id="app">
		<header class="app-header">
			<div class="logo">
				<span class="logo-text">-//--//-</span>
			</div>
			<div class="settings-icon">
				<span class="material-icons-outlined">settings</span>
			</div>
		</header>

		<nav class="top-nav">
			<a href="#" class="nav-link active" data-target="home">home</a> <span class="sep">|</span>
			<a href="#" class="nav-link" data-target="programs">programs</a> <span class="sep">|</span>
			<a href="#" class="nav-link" data-target="routines">routines</a> <span class="sep">|</span>
			<a href="#" class="nav-link" data-target="exercises">exercises</a>
		</nav>

		<main id="main-content">
			<!-- Views will be injected here -->
		</main>
	</div>

	<!-- Templates -->
	<template id="view-home">
		<div class="home-view">
			<div class="date-header">
				<span class="highlight" id="home-date-display">18 october 2026</span>
			</div>
			<div class="add-section" style="border-bottom: none;">
				<span class="add-tags">&lt;add tags&gt;</span>
				<button class="btn-add">+</button>
			</div>
			<!-- List container for populated state -->
			<div class="list-container" id="home-list"></div>

			<!-- Empty state container -->
			<div class="empty-state-row" id="home-empty">
				add routine/exercise to begin
			</div>
		</div>
	</template>

	<template id="view-programs">
		<div class="programs-view">
			<div class="main-add-row">
				<button class="btn-add">+</button>
			</div>
			<div class="list-container" id="programs-list"></div>
			<div class="empty-state-row" id="programs-empty">
				add program to begin
			</div>
		</div>
	</template>

	<template id="view-routines">
		<div class="routines-view">
			<div class="main-add-row">
				<button class="btn-add">+</button>
			</div>
			<div class="list-container" id="routines-list"></div>
			<div class="empty-state-row" id="routines-empty">
				add routine to begin
			</div>
		</div>
	</template>

	<template id="view-exercises">
		<div class="exercises-view">
			<div class="main-add-row">
				<button class="btn-add">+</button>
			</div>
			<div class="list-container" id="exercises-list"></div>
			<div class="empty-state-row" id="exercises-empty">
				add exercise to begin
			</div>
		</div>
	</template>

	<template id="view-exercise-detail">
		<div class="exercise-detail-view">
			<div class="detail-header">
				<span class="material-icons-outlined back-btn">arrow_back</span>
				<div class="detail-title">exercises / <span class="ex-name">shoulder press</span> <span
						class="material-icons-outlined edit-icon">edit</span></div>
			</div>

			<nav class="detail-nav">
				<a href="#" class="d-nav-link active">logs</a> <span class="sep">|</span>
				<a href="#" class="d-nav-link">notes</a> <span class="sep">|</span>
				<a href="#" class="d-nav-link">graph</a>
			</nav>

			<div class="log-input-section">
				<div class="input-row">
					<span class="input-label">s</span>
					<input type="number" class="val-input" placeholder="">
					<span class="unit">kg</span>
					<input type="number" class="val-input" placeholder="">
					<span class="unit">reps</span>
					<span class="add-tag-inline">&lt;add tag&gt;</span>
				</div>
				<button class="btn-large-add">+</button>
			</div>

			<div class="history-list">
			</div>
		</div>
	</template>

	<template id="view-exercise-edit">
		<div class="exercise-edit-view">
			<div class="detail-header">
				<span class="material-icons-outlined back-btn">arrow_back</span>
				<div class="detail-title">exercises / <span class="ex-name">shoulder press</span> <span
						class="material-icons-outlined edit-icon">edit</span></div>
			</div>

			<div class="edit-subtitle">edit</div>

			<div class="edit-options">
				<div class="edit-row">
					<label class="custom-checkbox">
						<input type="checkbox" checked data-type="kg">
						<span class="checkmark material-icons-outlined">check_box</span>
						kg
					</label>
					<label class="custom-checkbox">
						<input type="checkbox" checked data-type="reps">
						<span class="checkmark material-icons-outlined">check_box</span>
						reps
					</label>
				</div>
				<div class="edit-row">
					<label class="custom-checkbox">
						<input type="checkbox" data-type="km">
						<span class="checkmark material-icons-outlined">check_box_outline_blank</span>
						km
					</label>
					<label class="custom-checkbox">
						<input type="checkbox" data-type="m">
						<span class="checkmark material-icons-outlined">check_box_outline_blank</span>
						m
					</label>
				</div>
				<div class="edit-row">
					<label class="custom-checkbox">
						<input type="checkbox" data-type="laps">
						<span class="checkmark material-icons-outlined">check_box_outline_blank</span>
						laps
					</label>
					<label class="custom-checkbox">
						<input type="checkbox" data-type="time">
						<span class="checkmark material-icons-outlined">check_box_outline_blank</span>
						time
					</label>
				</div>
			</div>

			<button class="btn-large-add">save</button>
		</div>
	</template>

	<dialog id="selection-dialog">
		<div id="sd-title" style="font-weight: 600; margin-bottom: 16px;">Select</div>
		<div id="sd-list" class="list-container" style="max-height: 300px; overflow-y: auto; margin-bottom: 16px;"></div>
		<div id="sd-new-container" style="display: none; margin-bottom: 16px;">
			<input type="text" id="sd-input" class="inline-input" style="width: 100%" placeholder="Enter name...">
		</div>
		<div style="display: flex; justify-content: space-between;">
			<button type="button" id="sd-cancel">cancel</button>
			<button type="button" class="btn-dialog-add" id="sd-add-new-btn">add new</button>
			<button type="button" class="btn-dialog-add" id="sd-save-btn" style="display: none;">save</button>
		</div>
	</dialog>

	<script src="app.js"></script>
</body>

</html>
