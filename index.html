<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>input</title>

	<!-- PWA Support -->
	<link rel="manifest" href="manifest.json">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="input">
	<link rel="apple-touch-icon" href="favicon.png">
	<meta name="theme-color" content="#000000">

	<link rel="stylesheet" href="styles.css">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
	<link rel="icon" type="image/png" href="favicon.png">
</head>

<body>
	<div id="app">
		<header class="app-header">
			<div class="header-left">
				<div class="logo">
					<span class="logo-text">-//--//-</span>
				</div>
				<span class="material-icons-outlined back-btn" style="display: none;">arrow_back</span>
			</div>
			<div class="header-center">
				<span class="header-title" style="display: none;"></span>
			</div>
			<div class="header-right">
				<div class="settings-icon">
					<span class="material-icons-outlined">settings</span>
				</div>
				<span class="material-icons-outlined header-edit-icon" style="display: none;">edit</span>
			</div>
		</header>

		<nav class="top-nav">
			<a href="#" class="nav-link active" data-target="home">home</a> <span class="sep">|</span>
			<a href="#" class="nav-link" data-target="programs">programs</a> <span class="sep">|</span>
			<a href="#" class="nav-link" data-target="routines">routines</a> <span class="sep">|</span>
			<a href="#" class="nav-link" data-target="exercises">exercises</a>
		</nav>

		<main id="main-content">
			<!-- Views will be injected here -->
		</main>

		<div id="floating-timer" class="floating-timer">00:00</div>
	</div>

	<!-- Templates -->
	<template id="view-home">
		<div class="home-view">
			<div class="date-header">
				<span class="highlight" id="home-date-display">18 october 2026</span>
			</div>
			<div class="add-section" style="border-bottom: none;">
				<span class="add-tags">&lt;add tags&gt;</span>
				<button class="btn-add">+</button>
			</div>
			<!-- List container for populated state -->
			<div class="list-container" id="home-list"></div>

			<!-- Empty state container -->
			<div class="empty-state-row" id="home-empty">
				add routine/exercise to begin
			</div>

			<!-- Today's logs summary -->
			<div id="home-day-logs"></div>
		</div>
	</template>

	<template id="view-programs">
		<div class="programs-view">
			<div class="main-add-row">
				<button class="btn-add">+</button>
			</div>
			<div class="list-container" id="programs-list"></div>
			<div class="empty-state-row" id="programs-empty">
				add program to begin
			</div>
		</div>
	</template>

	<template id="view-routines">
		<div class="routines-view">
			<div class="main-add-row">
				<button class="btn-add">+</button>
			</div>
			<div class="list-container" id="routines-list"></div>
			<div class="empty-state-row" id="routines-empty">
				add routine to begin
			</div>
		</div>
	</template>

	<template id="view-exercises">
		<div class="exercises-view">
			<div class="main-add-row">
				<button class="btn-add">+</button>
			</div>
			<div class="list-container" id="exercises-list"></div>
			<div class="empty-state-row" id="exercises-empty">
				add exercise to begin
			</div>
		</div>
	</template>

	<template id="view-exercise-detail">
		<div class="exercise-detail-view">
			<nav class="detail-nav">
				<a href="#" class="d-nav-link active" data-tab="logs">logs</a> <span class="sep">|</span>
				<a href="#" class="d-nav-link" data-tab="notes">notes</a> <span class="sep">|</span>
				<a href="#" class="d-nav-link" data-tab="data">data</a>
			</nav>

			<div id="tab-logs">
				<div class="log-input-section">
					<div class="input-row">
						<span class="input-label">s</span>
						<input type="number" class="val-input" placeholder="">
						<span class="unit">kg</span>
						<input type="number" class="val-input" placeholder="">
						<span class="unit">reps</span>
						<span class="add-tag-inline">&lt;add tag&gt;</span>
					</div>
					<button class="btn-large-add">+</button>
				</div>

				<div class="history-list">
				</div>
			</div>

			<div id="tab-notes" style="display: none;">
				<textarea class="notes-textarea" placeholder=""></textarea>
			</div>

			<div id="tab-data" style="display: none;">
				<div class="data-view">
					<div id="exercise-data-filters"></div>
					<div class="settings-subheading" style="margin-top: 0;">records</div>
					<div id="exercise-records-list"></div>

					<div class="settings-subheading">stats</div>
					<div id="exercise-stats-list"></div>

					<div class="settings-subheading">1rm table</div>
					<div id="exercise-1rm-section"></div>
				</div>
			</div>
		</div>
	</template>

	<template id="view-exercise-edit">
		<div class="exercise-edit-view">
			<div class="edit-subtitle" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
				edit
				<button class="btn-add-sm" id="btn-add-custom-type">+</button>
			</div>

			<div class="edit-options">
				<!-- Checkboxes will be dynamically rendered here -->
			</div>

			<button class="btn-large-add">save</button>
		</div>
	</template>

	<template id="view-settings">
		<div class="settings-view">
			<div class="list-container" style="margin-top: 24px;">
				<div class="settings-subheading" style="margin-top: 0;">presets</div>
				<div class="list-item" style="justify-content: space-between; cursor: pointer;" id="btn-select-preset">
					<span>choose preset</span>
					<span class="material-icons-outlined" style="font-size: 18px;">palette</span>
				</div>
				<div class="list-item"
					style="flex-direction: column; align-items: flex-start; gap: 8px; cursor: default; padding: 12px 0;">
					<div style="display: flex; justify-content: space-between; width: 100%;">
						<span>hue</span>
						<span id="hue-value" style="color: var(--text-light); font-size: 12px;">0°</span>
					</div>
					<input type="range" id="hue-slider" min="0" max="360" value="0"
						style="width: 100%; cursor: pointer;">
				</div>

				<div class="settings-subheading">colors</div>
				<div class="list-item" style="justify-content: space-between; cursor: default;">
					<span>primary</span>
					<input type="color" id="color-primary"
						style="border: none; background: transparent; cursor: pointer; width: 40px; height: 30px; padding: 0;">
				</div>
				<div class="list-item" style="justify-content: space-between; cursor: default;">
					<span>background</span>
					<input type="color" id="color-bg"
						style="border: none; background: transparent; cursor: pointer; width: 40px; height: 30px; padding: 0;">
				</div>
				<div class="list-item" style="justify-content: space-between; cursor: default;">
					<span>text primary</span>
					<input type="color" id="color-text-dark"
						style="border: none; background: transparent; cursor: pointer; width: 40px; height: 30px; padding: 0;">
				</div>
				<div class="list-item" style="justify-content: space-between; cursor: default;">
					<span>text secondary</span>
					<input type="color" id="color-text-light"
						style="border: none; background: transparent; cursor: pointer; width: 40px; height: 30px; padding: 0;">
				</div>
				<div class="list-item" style="justify-content: space-between; cursor: default;">
					<span>text disabled</span>
					<input type="color" id="color-text-disabled"
						style="border: none; background: transparent; cursor: pointer; width: 40px; height: 30px; padding: 0;">
				</div>
				<div class="list-item" style="justify-content: space-between; cursor: default;">
					<span>borders & lines</span>
					<input type="color" id="color-border"
						style="border: none; background: transparent; cursor: pointer; width: 40px; height: 30px; padding: 0;">
				</div>
				<div class="list-item" style="justify-content: space-between; cursor: default;">
					<span>secondary button</span>
					<input type="color" id="color-btn-secondary"
						style="border: none; background: transparent; cursor: pointer; width: 40px; height: 30px; padding: 0;">
				</div>
				<div class="list-item" style="justify-content: space-between; cursor: default;">
					<span>remove icon</span>
					<input type="color" id="color-btn-remove"
						style="border: none; background: transparent; cursor: pointer; width: 40px; height: 30px; padding: 0;">
				</div>
				<div class="list-item" style="justify-content: space-between; cursor: default;">
					<span>danger</span>
					<input type="color" id="color-danger"
						style="border: none; background: transparent; cursor: pointer; width: 40px; height: 30px; padding: 0;">
				</div>
				<div class="settings-subheading">general</div>
				<div class="list-item" style="justify-content: space-between; cursor: default;">
					<span>show today's logs on home</span>
					<span class="material-icons-outlined" id="toggle-home-logs"
						style="cursor: pointer; font-size: 22px;"></span>
				</div>
				<div class="list-item" style="justify-content: space-between; cursor: default;">
					<span>show routine note icons</span>
					<span class="material-icons-outlined" id="toggle-routine-note-icons"
						style="cursor: pointer; font-size: 22px;"></span>
				</div>
				<div class="list-item" style="justify-content: space-between; cursor: pointer;"
					id="btn-select-1rm-formula">
					<span>1rm formula</span>
					<span id="label-1rm-formula" style="color: var(--text-light); font-size: 14px;"></span>
				</div>

				<div class="settings-subheading">testing</div>
				<div class="list-item" style="justify-content: space-between; cursor: default;">
					<span>debug date (dd-mm-yyyy)</span>
					<input type="text" id="debug-date-input" placeholder="e.g. 18-10-2026" autocapitalize="none"
						style="text-align: right; border: none; border-bottom: 1px solid var(--border-color); color: var(--text-dark); outline: none; background: transparent; width: 100px;">
				</div>

				<div class="settings-subheading">data management</div>
				<div class="list-item" id="btn-export-data"
					style="justify-content: center; font-weight: 500; cursor: pointer;">
					export data
				</div>
				<div class="list-item" id="btn-import-data"
					style="justify-content: center; font-weight: 500; cursor: pointer; position: relative;">
					import data
					<input type="file" id="import-file-input" accept=".json"
						style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
				</div>
				<div class="list-item" id="btn-clear-data"
					style="color: var(--danger-color); justify-content: center; font-weight: 500; cursor: pointer;">
					clear all data
				</div>
			</div>
			<div style="text-align: center; color: var(--text-disabled); font-size: 12px; margin-top: 24px;"
				id="app-version"></div>
		</div>
	</template>

	<dialog id="selection-dialog">
		<div id="sd-title" style="font-weight: 600; margin-bottom: 16px;">Select</div>
		<input type="search" id="sd-search" class="inline-input sd-search" placeholder="Search...">
		<div id="sd-list" class="list-container" style="max-height: 300px; overflow-y: auto; margin-bottom: 16px;">
		</div>
		<div id="sd-new-container" style="display: none; margin-bottom: 16px;">
			<input type="text" id="sd-input" class="inline-input" style="width: 100%" placeholder="Enter name...">
		</div>
		<div style="display: flex; justify-content: space-between;">
			<button type="button" id="sd-cancel">cancel</button>
			<button type="button" class="btn-dialog-add" id="sd-add-new-btn">add new</button>
			<button type="button" class="btn-dialog-add" id="sd-save-btn" style="display: none;">save</button>
		</div>
	</dialog>

	<dialog id="calendar-dialog">
		<div class="cal-header">
			<span class="cal-nav material-icons-outlined" id="cal-prev">chevron_left</span>
			<span id="cal-month-label"></span>
			<span class="cal-nav material-icons-outlined" id="cal-next">chevron_right</span>
		</div>
		<div class="cal-day-names">
			<span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
		</div>
		<div id="cal-grid" class="cal-grid"></div>
		<div style="display: flex; justify-content: flex-start;">
			<button type="button" id="cal-cancel">cancel</button>
		</div>
	</dialog>

	<dialog id="generic-dialog">
		<div id="gd-message" style="margin-bottom: 20px; line-height: 1.6;"></div>
		<div id="gd-input-container" style="display: none; margin-bottom: 20px;">
			<input type="text" id="gd-input" class="inline-input" style="width: 100%">
		</div>
		<div style="display: flex; justify-content: flex-end; gap: 8px;" id="gd-buttons">
			<button type="button" id="gd-cancel"
				style="background: none; border: none; cursor: pointer; padding: 8px 16px;">cancel</button>
			<button type="button" class="btn-dialog-add" id="gd-confirm">ok</button>
		</div>
	</dialog>

	<script src="app.js"></script>
</body>

</html>
